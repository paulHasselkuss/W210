# Supported params for reference
params:
  logo: ""
  matomo:
    url: ""
    siteId: ""
  style: []

# Module dependencies
module:
  imports:
    - path: "github.com/feathericons/feather"
      mounts:
        - source: icons
          target: assets/img/icons
    - path: "github.com/nextapps-de/flexsearch"
      mounts:
        - source: dist
          target: assets/js/vendor/flexsearch
    - path: "github.com/instantpage/instant.page"
      mounts:
        - source: instantpage.js
          target: assets/js/vendor/instantpage.js

# Add search JSON
outputs:
  home:
    - HTML
    - JSON

# ToC & parser settings
markup:
  tableOfContents:
    endLevel: 2
    ordered: true
    startLevel: 2
  goldmark:
    parser:
      wrapStandAloneImageWithinParagraph: false
      attribute:
        block: true
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
        enable: true
  highlight:
    style: bw
