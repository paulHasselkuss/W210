{{ $logo := .Site.Params.Logo | default .Site.Title }}

{{ with resources.Get $logo }}

{{ if eq .MediaType.SubType "svg" }}
{{ partial "util/svg" ( dict "src" $logo "class" "site-logo" ) }}
{{ else }}
<img class="site-logo" src="{{ .RelPermalink }}" alt="{{ $.Site.Title }}">
{{ end }}

{{ else }}
<span class="site-logo">{{ $logo }}</span>
{{ end }}
