<footer class="footer">
  <div class="footer__item heading2">
    <a href="#" class="link link--plain">{{ partial "util/logo.html" . }}</a>
  </div>
  <ul class="footer__item menu">
    {{- partial "util/menu-item.html" (dict "menu" "footer" "page" .) -}}
  </ul>
  <div class="footer__item">
    <div>{{ replace site.Copyright "{currentYear}" now.Year | markdownify }}</div>
    <ul class="menu menu--social">
      <li class="menu__item"><input id="themeCheckbox" class="theme-toggle" type="checkbox" aria-label="Toggle theme" />
      </li>
      {{ partial "util/menu-item.html" (dict "menu" "social" "page" .) }}
    </ul>
  </div>
</footer>
