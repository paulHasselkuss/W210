{{ if site.Menus.primary }}

    <button class="icon icon--hamburger menu__trigger" popovertarget="primary-menu"></button>
    <ul id="primary-menu" popover class="header__popover header__popover--mobile">
      {{ partial "util/menu-item.html" (dict "menu" "primary" "page" .) }}
    </ul>
  </nav>
{{ end }}
