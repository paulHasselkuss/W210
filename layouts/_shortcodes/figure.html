<figure  class="grid__subgrid grid__span-all grid--default-wide {{ with .Get "class" }}{{ . }}{{ end }}">
  {{- if .Get "link" -}}
    <a href="{{ .Get "link" }}"{{ with .Get "target" }} target="{{ . }}"{{ end }}{{ with .Get "rel" }} rel="{{ . }}"{{ end }}>
  {{- end -}}

  {{ $alt := default (.Get "alt") (.Get "caption" | markdownify | plainify) }}
  {{ partial "util/img.html" (dict "src" (.Get "src") "page" .Page "alt" $alt "loading" (.Get "loading")) }}

  {{- $u := urls.Parse (.Get "src") -}}
  {{- $src := $u.String -}}
  {{- if not $u.IsAbs -}}
    {{- with or (.Page.Resources.Get $u.Path) (resources.Get $u.Path) -}}
      {{- $src = .RelPermalink -}}
    {{- end -}}
  {{- end -}}

  {{- if .Get "link" }}</a>{{ end -}}
  {{- if or (or (.Get "title") (.Get "caption")) (.Get "attr") -}}
    <figcaption class="aside grid__span-small">
      {{ with (.Get "title") -}}
        <b>{{ . }}: </b>
      {{- end -}}
      {{- if or (.Get "caption") (.Get "attr") -}}
        {{- .Get "caption" | markdownify -}}
        {{- with .Get "attrlink" }}
          <a href="{{ . }}">
        {{- end -}}
        {{- .Get "attr" | markdownify -}}
        {{- if .Get "attrlink" }}</a>{{ end }}
      {{- end }}
    </figcaption>
  {{- end }}
</figure>
