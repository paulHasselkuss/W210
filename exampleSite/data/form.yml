name: "complex-form"
attributes: 'method:"POST" action="/thank-you/" netlify'
fields:
- id: "first-name"
  label: "First Name"
  attributes: 'placeholder="Joe"'
- id: "last-name"
  label: "Last Name"
  attributes: 'placeholder="Public"'
- id: "email"
  type: "email"
  label: "Your Mail Address"
  attributes: 'placeholder="joe.public@hhu.de"'
- id: "affilation"
  label: "Your Current Affilation"
  attributes: 'placeholder="HHU"'
- id: "letter-of-motivation"
  label: "Letter of Motivation (140-200 words)"
  type: "textarea"
  attributes: 'rows=10 required'
- id: "cv"
  label: "Short CV (PDF)"
  type: "file"
  attributes: 'accept=".pdf" required'
- id: "privacy-policy"
  label: "Privacy Policy"
  type: "checkbox"
  describtion: "Yes, I have read the [privacy policy](#) and agree that the data I have provided may be collected and stored electronically. My data will only be used strictly for the purpose of processing and answering my enquiry."
